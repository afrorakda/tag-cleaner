<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>Tag Cleaner</title>
    
    <link rel="icon" href="image_13.png">
    <link rel="apple-touch-icon" href="image_13.png">

    <style>
        :root { --main: #333; --bg: #fff; --accent: #eee; --input-bg: #fafafa; --radius: 15px; }
        
        * { 
            -webkit-touch-callout: none !important; 
            -webkit-user-select: none !important; 
            user-select: none !important; 
            -webkit-tap-highlight-color: transparent;
            touch-action: pan-y;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg); display: flex; justify-content: center; 
            padding: 0; margin: 0; color: var(--main); -webkit-font-smoothing: antialiased; 
            height: 100vh; overflow: hidden;
        }

        .container { 
            width: 100%; max-width: 380px; height: 100vh; 
            display: flex; flex-direction: column; position: relative; 
            padding: 20px; box-sizing: border-box; 
        }

        .main-unit {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
        }
        
        header { 
            display: flex; justify-content: space-between; align-items: start; 
            margin-bottom: 15px; padding-top: 10px;
        }
        .title-group h1 { font-size: 1.7rem; font-weight: 800; letter-spacing: -0.8px; margin: 0; }
        .subtitle { font-size: 0.8rem; color: #777; font-weight: 500; margin-top: 4px; }

        .hub-link { 
            text-decoration: none; font-size: 0.7rem; font-weight: 800; color: #999; 
            background: transparent; border: 1px solid #ddd; padding: 4px 8px; border-radius: 10px; 
            transition: 0.2s; cursor: pointer;
        }
        .hub-link:active { transform: scale(0.95); background: var(--accent); color: var(--main); }

        .textarea-wrapper { position: relative; flex-grow: 1; width: 100%; margin-bottom: 15px; }

        textarea { 
            width: 100%; height: 100%; padding: 18px; border: 2px solid var(--accent); border-radius: var(--radius); 
            box-sizing: border-box; font-size: 16px; outline: none; transition: 0.2s; 
            font-weight: 500; background: var(--input-bg);
            line-height: 1.6; resize: none;
            -webkit-appearance: none; -webkit-text-fill-color: #333; opacity: 1 !important;
            user-select: auto !important; -webkit-user-select: auto !important; 
        }
        textarea:focus { border-color: var(--main); background: #fff; }
        textarea.flash { background: #fff !important; border-color: #aaa !important; transition: none; }

        /* クリアボタン（×） */
        .btn-clear-wrapper { position: absolute; right: 12px; bottom: 12px; display: none; }
        .btn-clear-wrapper.show { display: block; }
        .btn-clear {
            width: 28px; height: 28px; background: rgba(0,0,0,0.1); color: #666; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn-clear:active { background: #e63946; color: #fff; transform: scale(0.9); }

        .button-stack { display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }

        .main-btn { 
            width: 100%; padding: 18px; border-radius: var(--radius); 
            font-size: 1rem; font-weight: 800; cursor: pointer; transition: all 0.2s; 
            -webkit-appearance: none; border: 2px solid var(--main);
        }
        .main-btn:active { transform: scale(0.97); opacity: 0.8; }

        /* 動的ステータス用スタイル */
        .btn-extract.active { background-color: var(--main); color: #fff; }
        .btn-extract.inactive { background-color: #fff; color: var(--main); border-color: var(--accent); }
        
        .btn-copy.inactive { background-color: #fff; color: var(--main); }
        .btn-copy.active { background-color: var(--main); color: #fff; border-color: var(--main); animation: pulse 0.4s ease-out; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        /* 鉄壁フッター */
        footer { padding: 15px 0 25px; text-align: center; border-top: 1px solid #f5f5f5; font-size: 11px; color: #666; font-weight: 600; }
        .footer-btns { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        
        .outline-btn { 
            background: #fff; color: var(--main); border: 2px solid var(--main); 
            padding: 12px; border-radius: var(--radius); text-decoration: none; 
            font-weight: 800; font-size: 13px; display: flex; align-items: center; 
            justify-content: center; cursor: pointer; transition: 0.2s;
        }
        .outline-btn:active { background: var(--accent); transform: scale(0.97); }

        .footer-info { line-height: 1.6; }
        .footer-info a { color: inherit; text-decoration: underline; display: inline-block; padding: 4px; }

        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #fff; width: 85%; max-width: 340px; padding: 30px; border-radius: var(--radius); position: relative; text-align: left; }
        .close-x { position: absolute; top: 15px; right: 20px; font-size: 24px; color: #888; cursor: pointer; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="container">
    <div class="main-unit">
        <header>
            <div class="title-group">
                <h1>Tag Cleaner</h1>
                <p class="subtitle">Extract unique hashtags instantly.</p>
            </div>
            <a href="https://afrorakda.github.io/" class="hub-link">🏠 Hub</a>
        </header>
        
        <div class="textarea-wrapper">
            <textarea id="workArea" placeholder="Paste your draft here..."></textarea>
            <div id="clearWrapper" class="btn-clear-wrapper">
                <div class="btn-clear" onclick="resetAll()">×</div>
            </div>
        </div>
        
        <div class="button-stack">
            <button class="main-btn btn-extract active" id="extractBtn" onclick="extractTags()">EXTRACT TAGS</button>
            <button class="main-btn btn-copy inactive" id="copyBtn" onclick="copyTags()">COPY TAGS</button>
        </div>
    </div>

    <footer id="dynamic-footer">
        <div class="footer-btns">
            <a href="https://ko-fi.com/afrorakda" target="_blank" class="outline-btn" id="kofi-link">☕️buy me a coffee</a>
            <button class="outline-btn" onclick="showModal()" id="install-text">Add to Home Screen</button>
        </div>
        <div class="footer-info">
            No login / No tracking / No ads / Browser only<br>
            <a href="https://afrorakda.com/privacy/" id="privacy-link">Privacy Policy</a><br>
            <span id="copyright">Tag Cleaner © 2026</span>
        </div>
    </footer>
</div>

<div id="modal" onclick="hideModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-x" onclick="hideModal()">×</span>
        <h3 id="modal-title" style="margin-top:0;">Install App</h3>
        <p id="modal-msg" style="font-size:14px; font-weight:600;">Add to home screen for easy access.</p>
        <p id="modal-ios" style="font-size:13px; color:#666;">iOS: Tap Share then 'Add to Home Screen'.</p>
        <p id="modal-android" style="font-size:13px; color:#666;">Android: Tap Menu then 'Add to Home screen'.</p>
    </div>
</div>

<script>
    const area = document.getElementById('workArea');
    const extractBtn = document.getElementById('extractBtn');
    const copyBtn = document.getElementById('copyBtn');
    const clearWrapper = document.getElementById('clearWrapper');

    // 監視：入力がある時だけクリアボタンを出す
    area.addEventListener('input', () => {
        if (area.value.length > 0) clearWrapper.classList.add('show');
        else clearWrapper.classList.remove('show');
        
        // 編集されたらボタンの状態をリセット
        extractBtn.classList.remove('inactive');
        extractBtn.classList.add('active');
        copyBtn.classList.remove('active');
        copyBtn.classList.add('inactive');
        copyBtn.innerText = "COPY TAGS";
    });

    function extractTags() {
        if (!area.value) return;
        const text = area.value;
        const tagRegex = /#[\w\u3040-\u30ff\u3400-\u4dbf\u4e00-\u9fff\uF900-\uFAFF\uFF66-\uFF9F]+/g;
        const matches = text.match(tagRegex);
        
        if (matches) {
            const uniqueTags = [...new Set(matches)];
            area.value = uniqueTags.join(" ");
            
            // 視覚的フィードバック
            area.classList.add('flash');
            setTimeout(() => area.classList.remove('flash'), 150);

            // ボタンの状態を遷移
            extractBtn.classList.remove('active');
            extractBtn.classList.add('inactive');
            copyBtn.classList.remove('inactive');
            copyBtn.classList.add('active');
            
            area.focus();
        } else {
            alert("No hashtags found!");
        }
    }

    function copyTags() {
        if (!area.value) return;
        
        navigator.clipboard.writeText(area.value).then(() => {
            const originalText = copyBtn.innerText;
            copyBtn.innerText = "COPIED!";
            setTimeout(() => {
                copyBtn.innerText = "COPY TAGS";
            }, 1500);
        });
    }

    function resetAll() {
        if (!area.value) return;
        if (confirm('Clear all text?')) {
            area.value = "";
            clearWrapper.classList.remove('show');
            extractBtn.classList.remove('inactive');
            extractBtn.classList.add('active');
            copyBtn.classList.remove('active');
            copyBtn.classList.add('inactive');
            area.focus();
        }
    }

    function showModal() { document.getElementById('modal').style.display = 'flex'; }
    function hideModal() { document.getElementById('modal').style.display = 'none'; }

    async function loadFooter() {
        try {
            const response = await fetch('footer.json');
            if (!response.ok) return;
            const data = await response.json();
            if(data.kofi) { document.getElementById('kofi-link').href = data.kofi.url; document.getElementById('kofi-link').textContent = data.kofi.text; }
            if(data.install) {
                document.getElementById('install-text').textContent = data.install.text;
                document.getElementById('modal-title').textContent = data.install.title;
                document.getElementById('modal-msg').textContent = data.install.msg;
                document.getElementById('modal-ios').textContent = data.install.ios;
                document.getElementById('modal-android').textContent = data.install.android;
            }
            if(data.privacy) document.getElementById('privacy-link').href = data.privacy.url;
        } catch (e) { console.error("Footer update skipped."); }
    }
    window.addEventListener('DOMContentLoaded', loadFooter);
</script>

</body>
</html>
